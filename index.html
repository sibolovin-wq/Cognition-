<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ Cognitive Assessment Practice - Mini-ACE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body.large-text { font-size: 18px; }
        body.large-text h1 { font-size: 36px; }
        body.large-text button { font-size: 18px; padding: 18px 30px; }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        .header { text-align: center; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header-controls { display: flex; gap: 10px; }
        .toggle-btn { padding: 8px 14px; background: #e0e0e0; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .toggle-btn.active { background: #667eea; color: white; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #667eea; transition: width 0.3s; width: 0%; }
        .test-content { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .instruction { background: #e3f2fd; border-left: 4px solid #2196F3; padding: 15px; margin-bottom: 15px; color: #1565c0; border-radius: 4px; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; text-align: left; border: 2px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .choice-btn:hover { border-color: #667eea; background: #f0f4ff; }
        .btn-primary { background: #667eea; color: white; padding: 15px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        .score-item { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; border-left: 4px solid #667eea; margin-bottom: 10px; }
        .countdown-timer { font-size: 24px; color: #d32f2f; font-weight: bold; text-align: center; margin: 10px 0; }
        .drawing-ref { border: 1px dashed #ccc; padding: 10px; margin-top: 10px; background: #fff; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Mini-ACE</h1>
            <div class="header-controls">
                <button class="toggle-btn" id="audioBtn" onclick="toggleAudio()">🔊</button>
                <button class="toggle-btn" id="textBtn" onclick="toggleTextSize()">A+</button>
            </div>
        </div>

        <div id="welcomeScreen" class="screen active">
            <p>This is a practice tool for the NZ Older Driver cognitive assessment. It takes about 5 minutes.</p>
            <button class="btn-primary" style="margin-top:20px" onclick="startTest()">Start Practice</button>
        </div>

        <div id="testScreen" class="screen">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="testContent"></div>
            <button class="btn-primary" id="nextBtn" onclick="handleNextClick()">Next</button>
        </div>

        <div id="resultsScreen" class="screen">
            <div style="text-align:center; margin-bottom:20px;">
                <h2>Your Score: <span id="totalScore">0/30</span></h2>
                <p id="interpretation"></p>
            </div>
            <div id="scoreBreakdown"></div>
            <button class="btn-primary" onclick="location.reload()">Restart</button>
        </div>
    </div>

    <script>
        let audioEnabled = false;
        let timerInterval;
        const test = {
            currentSection: 0,
            sections: [
                {id: 'attention', name: 'Attention', maxScore: 4, userScore: 0},
                {id: 'memory-immediate', name: 'Memory - Immediate', maxScore: 3, userScore: 0},
                {id: 'fluency', name: 'Fluency', maxScore: 7, userScore: 0},
                {id: 'visuospatial', name: 'Visuospatial', maxScore: 6, userScore: 0},
                {id: 'language', name: 'Language', maxScore: 6, userScore: 0},
                {id: 'memory-delayed', name: 'Memory - Delayed', maxScore: 4, userScore: 0}
            ],
            attentionStep: 0,
            memoryWords: ['Apple', 'Table', 'Penny'],
            namingIndex: 0
        };

        function toggleAudio() { audioEnabled = !audioEnabled; document.getElementById('audioBtn').classList.toggle('active'); }
        function toggleTextSize() { document.body.classList.toggle('large-text'); document.getElementById('textBtn').classList.toggle('active'); }
        function speak(t) { if(audioEnabled) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.rate = 0.9; window.speechSynthesis.speak(u); } }

        function startTest() {
            test.currentSection = 0;
            showSection();
        }

        function showSection() {
            clearInterval(timerInterval);
            const section = test.sections[test.currentSection];
            document.getElementById('progressFill').style.width = (test.currentSection / test.sections.length * 100) + '%';
            document.getElementById('nextBtn').style.display = (['attention', 'language', 'memory-immediate', 'memory-delayed'].includes(section.id)) ? 'none' : 'block';
            
            let html = `<h3>${section.name}</h3>`;
            
            if(section.id === 'attention') html += renderAttention();
            if(section.id === 'memory-immediate') html += renderMemory(true);
            if(section.id === 'fluency') { html += renderFluency(); startFluencyTimer(); }
            if(section.id === 'visuospatial') html += renderVisuospatial();
            if(section.id === 'language') html += renderLanguage();
            if(section.id === 'memory-delayed') html += renderMemory(false);

            document.getElementById('testContent').innerHTML = html;
            document.getElementById('testScreen').classList.add('active');
            document.getElementById('welcomeScreen').classList.remove('active');
        }

        function renderAttention() {
            const seqs = [[3,7], [4,2,9], [1,8,5,3], [6,2,7,4,9]];
            const current = seqs[test.attentionStep];
            speak("Remember these numbers: " + current.join(' '));
            setTimeout(() => {
                document.getElementById('seqBox').innerHTML = `<p>Select the sequence you saw:</p>`;
                document.getElementById('attnOptions').style.display = 'block';
            }, 3000);
            return `<div class="test-content" id="seqBox"><div class="instruction">Remember this sequence:</div><h1 style="text-align:center; letter-spacing:10px;">${current.join('')}</h1></div>
                    <div id="attnOptions" style="display:none">
                        <button class="choice-btn" onclick="scoreAttention(true)">${current.join(', ')}</button>
                        <button class="choice-btn" onclick="scoreAttention(false)">${current.reverse().join(', ')}</button>
                    </div>`;
        }

        function renderMemory(immediate) {
            const prompt = immediate ? "Remember these words for later:" : "Recall the words from earlier:";
            speak(prompt + test.memoryWords.join(' '));
            return `<div class="test-content"><div class="instruction">${prompt}</div>
                    ${immediate ? `<h2 style="text-align:center">${test.memoryWords.join(' - ')}</h2>` : ''}
                    <p style="margin-top:10px">Which set is correct?</p>
                    <button class="choice-btn" onclick="scoreMemory(true, ${immediate})">Apple, Table, Penny</button>
                    <button class="choice-btn" onclick="scoreMemory(false, ${immediate})">Apple, Chair, Penny</button></div>`;
        }

        function renderFluency() {
            return `<div class="test-content"><div class="instruction">Type as many words as you can starting with the letter 'P'.</div>
                    <div class="countdown-timer" id="timer">60s</div>
                    <textarea id="fluencyInput" style="width:100%; height:100px; padding:10px;" placeholder="Type words here..."></textarea></div>`;
        }

        function renderVisuospatial() {
            return `<div class="test-content"><div class="instruction">On a piece of paper, draw a Clock showing 11:10 and a Cube.</div>
                    <div class="drawing-ref"><strong>Reference:</strong><br>Clock: Circle, all numbers, hands at 11 and 2.<br>Cube: 12 lines, 3D perspective.</div>
                    <p>Rate your drawing (0-6 total points):</p>
                    <input type="number" id="vScore" min="0" max="6" value="6" style="padding:10px; width:100px;"></div>`;
        }

        function renderLanguage() {
            const qs = [
                {q: "Repeat: 'No ifs, ands, or buts'", options: ["No ifs, ands, or buts", "No if and but"]},
                {q: "What is a device for telling time?", options: ["Clock", "Altimeter"]},
                {q: "What do you write with?", options: ["Pen", "Key"]}
            ];
            const current = qs[test.namingIndex];
            speak(current.q);
            return `<div class="test-content"><div class="instruction">Question ${test.namingIndex + 1} of 3</div>
                    <p style="font-size:1.2em; margin-bottom:15px;">${current.q}</p>
                    ${current.options.map(o => `<button class="choice-btn" onclick="scoreLanguage('${o === current.options[0]}')">${o}</button>`).join('')}
                    </div>`;
        }

        function scoreAttention(correct) {
            if(correct) test.sections[0].userScore++;
            test.attentionStep++;
            if(test.attentionStep < 4) showSection(); else nextSection();
        }

        function scoreMemory(correct, immediate) {
            let sec = immediate ? 1 : 5;
            test.sections[sec].userScore = correct ? test.sections[sec].maxScore : 0;
            nextSection();
        }

        function startFluencyTimer() {
            let time = 60;
            timerInterval = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = time + 's';
                if(time <= 0) { clearInterval(timerInterval); handleNextClick(); }
            }, 1000);
        }

        function scoreLanguage(correct) {
            if(correct === 'true') test.sections[4].userScore += 2;
            test.namingIndex++;
            if(test.namingIndex < 3) showSection(); else nextSection();
        }

        function handleNextClick() {
            const sec = test.sections[test.currentSection];
            if(sec.id === 'fluency') {
                const words = document.getElementById('fluencyInput').value.split(/\s+/).filter(w => w.length > 2);
                test.sections[2].userScore = Math.min(words.length, 7);
            }
            if(sec.id === 'visuospatial') {
                test.sections[3].userScore = parseInt(document.getElementById('vScore').value);
            }
            nextSection();
        }

        function nextSection() {
            test.currentSection++;
            if(test.currentSection < test.sections.length) showSection(); else finish();
        }

        function finish() {
            document.getElementById('testScreen').classList.remove('active');
            document.getElementById('resultsScreen').classList.add('active');
            let total = 0;
            let breakdownHtml = "";
            test.sections.forEach(s => {
                total += s.userScore;
                breakdownHtml += `<div class="score-item"><strong>${s.name}:</strong> ${s.userScore}/${s.maxScore}</div>`;
            });
            document.getElementById('totalScore').innerText = total + "/30";
            document.getElementById('scoreBreakdown').innerHTML = breakdownHtml;
            document.getElementById('interpretation').innerText = total >= 26 ? "Result: Normal" : "Result: Consider consulting a GP for a formal check.";
        }
    </script>
</body>
</html>
