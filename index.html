<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ Cognitive Assessment Practice - Mini-ACE</title>
    <style>
        /* [Existing Styles Kept for Consistency] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .instruction { background: #e3f2fd; border-left: 4px solid #2196F3; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; text-align: left; border: 2px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .choice-btn:hover { border-color: #667eea; background: #f8f9ff; }
        .btn-primary { background: #2c3e50; color: white; padding: 15px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .countdown-timer { font-size: 28px; color: #e74c3c; font-weight: bold; text-align: center; margin: 10px 0; }
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: #2ecc71; width: 0%; transition: 0.5s; }
    </style>
</head>
<body>
    <div class="container">
        <div id="welcomeScreen" class="screen active">
            <h1 style="margin-bottom:10px;">🧠 Mini-ACE Practice</h1>
            <p>This practice session will shuffle answers to ensure you are learning the concepts, not just the button locations.</p>
            <button class="btn-primary" onclick="startTest()">Start Assessment</button>
        </div>

        <div id="testScreen" class="screen">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="testContent"></div>
            <button class="btn-primary" id="nextBtn" style="display:none;" onclick="handleNextClick()">Next</button>
        </div>

        <div id="resultsScreen" class="screen">
            <h2 style="text-align:center;">Results</h2>
            <h1 id="totalScore" style="text-align:center; font-size: 48px; color: #2c3e50;">0/30</h1>
            <div id="scoreBreakdown" style="margin: 20px 0;"></div>
            <button class="btn-primary" onclick="location.reload()">Try Again</button>
        </div>
    </div>

    <script>
        let timerInterval;
        const test = {
            currentSection: 0,
            sections: [
                {id: 'attention', name: 'Attention', maxScore: 4, userScore: 0},
                {id: 'memory-immediate', name: 'Memory - Immediate', maxScore: 3, userScore: 0},
                {id: 'fluency', name: 'Fluency', maxScore: 7, userScore: 0},
                {id: 'visuospatial', name: 'Visuospatial', maxScore: 6, userScore: 0},
                {id: 'language', name: 'Language', maxScore: 6, userScore: 0},
                {id: 'memory-delayed', name: 'Memory - Delayed', maxScore: 4, userScore: 0}
            ],
            attentionStep: 0,
            namingIndex: 0,
            memoryWords: ['Apple', 'Table', 'Penny']
        };

        // Helper to shuffle choices so you don't memorize "Top button is right"
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startTest() {
            document.getElementById('welcomeScreen').classList.remove('active');
            document.getElementById('testScreen').classList.add('active');
            showSection();
        }

        function showSection() {
            const section = test.sections[test.currentSection];
            document.getElementById('progressFill').style.width = ((test.currentSection / test.sections.length) * 100) + '%';
            
            // Show "Next" button only for open-ended parts
            document.getElementById('nextBtn').style.display = (['fluency', 'visuospatial'].includes(section.id)) ? 'block' : 'none';
            
            let html = `<h3>${section.name}</h3>`;
            
            if(section.id === 'attention') html += renderAttention();
            if(section.id === 'memory-immediate') html += renderMemory(true);
            if(section.id === 'fluency') { html += renderFluency(); startFluencyTimer(); }
            if(section.id === 'visuospatial') html += renderVisuospatial();
            if(section.id === 'language') html += renderLanguage();
            if(section.id === 'memory-delayed') html += renderMemory(false);

            document.getElementById('testContent').innerHTML = html;
        }

        function renderAttention() {
            const seqs = [[3,7], [4,2,9], [1,8,5,3], [6,2,7,4,9]];
            const current = seqs[test.attentionStep];
            const decoy = [...current].reverse();
            
            setTimeout(() => {
                document.getElementById('attnDisplay').style.display = 'none';
                document.getElementById('attnOptions').style.display = 'block';
            }, 2500);

            let buttons = shuffle([
                {text: current.join(', '), correct: true},
                {text: decoy.join(', '), correct: false}
            ]);

            return `<div class="test-content">
                <div id="attnDisplay">
                    <div class="instruction">Memorize these numbers:</div>
                    <h1 style="text-align:center; letter-spacing:8px;">${current.join('')}</h1>
                </div>
                <div id="attnOptions" style="display:none;">
                    <p>Which sequence did you see?</p>
                    ${buttons.map(b => `<button class="choice-btn" onclick="scoreAttention(${b.correct})">${b.text}</button>`).join('')}
                </div>
            </div>`;
        }

        function renderLanguage() {
            const qs = [
                {q: "Repeat exactly: 'No ifs, ands, or buts'", options: ["No ifs, ands, or buts", "No if and but"]},
                {q: "Which of these is a device for telling time?", options: ["Clock", "Thermometer", "Compass"]},
                {q: "What do you primarily write with?", options: ["Pen", "Key", "Spoon"]}
            ];
            const current = qs[test.namingIndex];
            let buttons = shuffle(current.options.map((opt, i) => ({text: opt, correct: i === 0})));

            return `<div class="test-content">
                <div class="instruction">Question ${test.namingIndex + 1} of 3</div>
                <p style="margin-bottom:15px; font-weight:bold;">${current.q}</p>
                ${buttons.map(b => `<button class="choice-btn" onclick="scoreLanguage(${b.correct})">${b.text}</button>`).join('')}
            </div>`;
        }

        function renderMemory(immediate) {
            let sets = [
                ['Apple', 'Table', 'Penny'],
                ['Apple', 'Chair', 'Penny'],
                ['Lemon', 'Table', 'Penny']
            ];
            let buttons = shuffle(sets.map((set, i) => ({text: set.join(', '), correct: i === 0})));

            return `<div class="test-content">
                <div class="instruction">${immediate ? 'Memorize these words:' : 'Recall the words from the start:'}</div>
                ${immediate ? `<h2 style="text-align:center; margin:10px;">${test.memoryWords.join(' - ')}</h2>` : ''}
                <p>Select the correct set:</p>
                ${buttons.map(b => `<button class="choice-btn" onclick="scoreMemory(${b.correct}, ${immediate})">${b.text}</button>`).join('')}
            </div>`;
        }

        function renderFluency() {
            return `<div class="test-content">
                <div class="instruction">Name as many words as possible starting with 'P' (excluding names).</div>
                <div class="countdown-timer" id="timer">60s</div>
                <textarea id="fluencyInput" style="width:100%; height:120px; padding:10px; border-radius:8px;" placeholder="Type words here..."></textarea>
            </div>`;
        }

        function renderVisuospatial() {
            return `<div class="test-content">
                <div class="instruction">Task: Draw a Clock (11:10) and a Cube on paper.</div>
                <p>Self-Score (Did you include all numbers? Is the cube 3D?):</p>
                <select id="vScore" style="width:100%; padding:10px; margin-top:10px;">
                    <option value="6">Perfect (6/6)</option>
                    <option value="4">Minor errors (4/6)</option>
                    <option value="2">Significant errors (2/6)</option>
                    <option value="0">Unable to complete (0/6)</option>
                </select>
            </div>`;
        }

        // --- Logic Handlers ---

        function scoreAttention(correct) {
            if(correct) test.sections[0].userScore++;
            test.attentionStep++;
            if(test.attentionStep < 4) showSection(); else nextSection();
        }

        function scoreLanguage(correct) {
            if(correct) test.sections[4].userScore += 2;
            test.namingIndex++;
            if(test.namingIndex < 3) showSection(); else nextSection();
        }

        function scoreMemory(correct, immediate) {
            let sec = immediate ? 1 : 5;
            if(correct) test.sections[sec].userScore = test.sections[sec].maxScore;
            nextSection();
        }

        function startFluencyTimer() {
            let time = 60;
            timerInterval = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = time + 's';
                if(time <= 0) { clearInterval(timerInterval); handleNextClick(); }
            }, 1000);
        }

        function handleNextClick() {
            clearInterval(timerInterval);
            const sec = test.sections[test.currentSection];
            if(sec.id === 'fluency') {
                const words = document.getElementById('fluencyInput').value.split(/[\s,]+/).filter(w => w.length > 2);
                test.sections[2].userScore = Math.min(words.length, 7);
            }
            if(sec.id === 'visuospatial') {
                test.sections[3].userScore = parseInt(document.getElementById('vScore').value);
            }
            nextSection();
        }

        function nextSection() {
            test.currentSection++;
            if(test.currentSection < test.sections.length) showSection(); else finish();
        }

        function finish() {
            document.getElementById('testScreen').classList.remove('active');
            document.getElementById('resultsScreen').classList.add('active');
            let total = 0;
            let breakdownHtml = "";
            test.sections.forEach(s => {
                total += s.userScore;
                breakdownHtml += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${s.name}</span>
                    <strong>${s.userScore}/${s.maxScore}</strong>
                </div>`;
            });
            document.getElementById('totalScore').innerText = total + "/30";
            document.getElementById('scoreBreakdown').innerHTML = breakdownHtml;
        }
    </script>
</body>
</html>
